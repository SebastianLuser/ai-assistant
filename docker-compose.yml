services:
  jarvis:
    build:
      context: .
    restart: always
    ports:
      - "8081:8080"
    environment:
      - STORAGE_BACKEND=postgres
      - POSTGRES_DSN=postgres://jarvis:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/jarvis?sslmode=disable
    env_file:
      - .env
    volumes:
      - ./credentials.json:/app/credentials.json:ro
      - ./skills:/app/skills:ro
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: jarvis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: jarvis
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jarvis"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
